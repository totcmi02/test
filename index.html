<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ปิดปรับปรุงระบบชั่วคราว </title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* กำหนดโทนสีของ NT */
        :root {
            --nt-yellow: #FFC72C;
            --nt-blue: #002D62;
            --text-main: #333333;
            --text-muted: #666666;
            --bg-color: #f4f6f9;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            color: var(--text-main);
        }

        .maintenance-container {
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 45, 98, 0.08);
            max-width: 500px;
            width: 90%;
            /* เส้นแถบสีเหลืองด้านบนกล่อง */
            border-top: 6px solid var(--nt-yellow);
            position: relative;
            overflow: hidden;
        }

        /* ตกแต่งโลโก้แบบตัวอักษร */
        .logo {
            font-size: 52px;
            font-weight: 600;
            color: var(--nt-blue);
            margin-bottom: 25px;
            letter-spacing: -2px;
        }
        
        .logo span {
            color: var(--nt-yellow);
        }

        .icon-wrapper {
            margin-bottom: 25px;
            color: var(--nt-blue);
            opacity: 0.9;
        }

        /* แอนิเมชันฟันเฟืองหมุน */
        .fa-cog {
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 24px;
            margin-bottom: 15px;
            color: var(--nt-blue);
            font-weight: 600;
        }

        p {
            font-size: 16px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .contact-info {
            font-size: 15px;
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 8px;
            border-left: 4px solid var(--nt-yellow);
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
        }

        .contact-info a {
            color: var(--nt-blue);
            text-decoration: none;
            font-weight: 600;
            font-size: 18px;
            margin-left: 5px;
        }

        .contact-info a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="maintenance-container">
        <div class="logo">nt<span>.</span></div>
        
        <div class="icon-wrapper">
            <i class="fas fa-cog fa-4x"></i>
        </div>
        
        <h1>ระบบกำลังปิดปรับปรุง</h1>
        
        <p>
            ขออภัยในความไม่สะดวก<br>
            ขณะนี้เรากำลังดำเนินการปรับปรุงระบบเพื่อเพิ่มประสิทธิภาพ<br>
            ระบบจะกลับมาให้บริการตามปกติในเร็วๆ นี้
        </p>
        
        <div class="contact-info">
            <i class="fas fa-headset" style="color: var(--nt-blue); margin-right: 8px;"></i>
            สอบถามข้อมูลเพิ่มเติมได้ที่ 
            <br>
            <strong> NT CHIANGMAI SNAPS TEAM </strong> 
        </div>
    </div>

</body>
</html>
